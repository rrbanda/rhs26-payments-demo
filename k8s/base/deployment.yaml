apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-ops
  namespace: rhs26-payments-demo
  labels:
    app.kubernetes.io/name: payment-ops
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-ops
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-ops
    spec:
      containers:
        - name: agent
          image: image-registry.openshift-image-registry.svc:5000/rhs26-payments-demo/payment-ops:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: LLAMASTACK_API_KEY
              value: "not-needed"
            - name: NEO4J_PASSWORD
              value: "notused"
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: payment-ops-config
